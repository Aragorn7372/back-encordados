info:
  name: Obtener material por nombre
  type: http
  seq: 3

docs: |
  # Obtener Material por Nombre

  Obtiene los detalles de un material específico buscando por nombre/modelo.

  ## Authorization
  RequireAdminRole

  ## HTTP Method
  `GET /api/Materials/name/{name}`

  ## Parameters (Path)
  | Parámetro | Tipo | Descripción |
  |-----------|------|-------------|
  | `name` | string | Nombre o modelo del material |

  ## Responses
  - **200 OK**: `MaterialResponseDto` con datos del material
  - **401 Unauthorized**: Token inválido o expirado
  - **403 Forbidden**: No tiene permisos de Admin
  - **404 Not Found**: Material no encontrado

  ## Test Cases
  - [ ] Obtener material existente por nombre
  - [ ] Intentar obtener material inexistente (404)
  - [ ] Intentar sin permisos de Admin (403)

http:
  method: GET
  url: "{{api-url}}/api/Materials/name/Grip"
  auth:
    type: bearer
    token: "{{token_admin}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5