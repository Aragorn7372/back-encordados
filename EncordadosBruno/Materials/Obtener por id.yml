  name: Obtener material por id
  type: http
  seq: 2

docs: |
  # Obtener Material por ID

  Obtiene los detalles de un material específico por su ID.

  ## Authorization
  RequireAdminRole

  ## HTTP Method
  `GET /api/Materials/{id}`

  ## Parameters (Path)
  | Parámetro | Tipo | Descripción |
  |-----------|------|-------------|
  | `id` | long | ID numérico del material |

  ## Responses
  - **200 OK**: `MaterialResponseDto` con datos del material
  - **401 Unauthorized**: Token inválido o expirado
  - **403 Forbidden**: No tiene permisos de Admin
  - **404 Not Found**: Material no encontrado

  ## Test Cases
  - [ ] Obtener material existente por ID válido
  - [ ] Intentar obtener material inexistente (404)
  - [ ] Intentar sin permisos de Admin (403)

http:
  method: GET
  url: "{{api-url}}/api/Materials/1"
  auth:
    type: bearer
    token: "{{token_admin}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5