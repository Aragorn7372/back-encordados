info:
  name: Obtener cuerda por nombre
  type: http
  seq: 3

http:
  method: GET
  url: "{{api-url}}/api/Cuerdas/name/RPM Blast"
  auth:
    type: bearer
    token: "{{token_admin}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  # Obtener Cuerda por Nombre

  Obtiene los detalles de una cuerda específica buscando por nombre/modelo.

  ## Authorization
  RequireAdminRole

  ## HTTP Method
  `GET /api/Cuerdas/name/{name}`

  ## Parameters (Path)
  | Parámetro | Tipo | Descripción |
  |-----------|------|-------------|
  | `name` | string | Nombre o modelo de la cuerda |

  ## Responses
  - **200 OK**: `CuerdaResponseDto` con datos de la cuerda
  - **401 Unauthorized**: Token inválido o expirado
  - **403 Forbidden**: No tiene permisos de Admin
  - **404 Not Found**: Cuerda no encontrada

  ## Test Cases
  - [ ] Obtener cuerda existente por nombre
  - [ ] Intentar obtener cuerda inexistente (404)
  - [ ] Intentar sin permisos de Admin (403)
