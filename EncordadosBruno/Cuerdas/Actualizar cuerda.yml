info:
  name: Actualizar cuerda
  type: http
  seq: 5

http:
  method: PUT
  url: "{{api-url}}/api/Cuerdas/1"
  body:
    type: json
    data: |-
      {
        "Marca": "Babolat",
        "TournamentId": 1,
        "Modelo": "RPM Blast 2.1",
        "Stock": 150,
        "Precio": 19.99,
        "StringFormat": "set",
        "StringsType": "Polyester"
      }
  auth:
