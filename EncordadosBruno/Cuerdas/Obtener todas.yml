info:
  name: Obtener todas las cuerdas
  type: http
  seq: 1

http:
  method: GET
  url: "{{api-url}}/api/Cuerdas?page=0&size=10&sortBy=createdAt&direction=desc"
  auth:
    type: bearer
    token: "{{token_admin}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5