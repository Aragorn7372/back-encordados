info:
  name: Crear línea de pedido
  type: http
  seq: 12

docs: |
  # Crear Línea de Pedido

  Añade una nueva línea a un pedido existente.

  ## Authorization
  RequireAdminRole

  ## HTTP Method
  `POST /api/Purchased/{pedidoId}/lineas`

  ## Parameters (Path)
  | Parámetro | Tipo | Descripción |
  |-----------|------|-------------|
  | `pedidoId` | string (ULID) | ID único del pedido |

  ## Body (JSON)
  ```json
  {
    "RaquetModel": "Wilson Pro Staff",
    "Nudos": 2,
    "DateString": "2026-07-01T00:00:00Z",
    "Logotype": false,
    "Color": "Azul",
    "StringSetup": {
      "StringV": "Luxilon ALU Power",
      "TensionV": 28.0,
      "PreStetchV": 3,
      "StringH": "Luxilon Big Hitter",
      "TensionH": 27.0,
      "PreStetchH": 2
    }
  }
  ```

  ## Campos
  | Campo | Tipo | Descripción |
  |-------|------|-------------|
  | `RaquetModel` | string | Modelo de raqueta (requerido) |
  | `Nudos` | byte | Número de nudos |
  | `DateString` | datetime | Fecha de encordado |
  | `Logotype` | bool | Si lleva logo |
  | `Color` | string? | Color opcional |
  | `StringSetup` | object | Configuración de cuerdas |

  ## Responses
  - **201 Created**: `PedidoLineaResponseDto` con datos de la línea creada
  - **400 Bad Request**: Datos inválidos
  - **401 Unauthorized**: Token inválido o expirado
  - **403 Forbidden**: No tiene permisos de Admin
  - **404 Not Found**: Pedido no encontrado

  ## Test Cases
  - [ ] Crear línea con todos los campos
  - [ ] Crear línea con pedido inexistente (404)
  - [ ] Intentar sin permisos de Admin (403)

http:
  method: POST
  url: "{{api-url}}/api/Purchased/01KR42ME5P1Q2BGWW1DY11Z4TJ/lineas"
  body:
