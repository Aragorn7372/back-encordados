info:
  name: Crear línea de pedido (Encoder)
  type: http
  seq: 8

docs: |
  # Crear Línea de Pedido como Encoder

  Añade una nueva línea a un pedido existente.

  ## Authorization
  RequireEncoderRole

  ## HTTP Method
  `POST /api/Purchased/{pedidoId}/lineas`

  ## Parameters (Path)
  | Parámetro | Tipo | Descripción |
  |-----------|------|-------------|
  | `pedidoId` | string | ID del pedido |

  ## Body (JSON)
  ```json
  {
    "RaquetModel": "Babolat Pure Drive",
    "Nudos": 2,
    "DateString": "2026-06-20T00:00:00Z",
    "Logotype": false,
    "Color": "Azul",
    "StringSetup": {
      "StringV": "Babolat RPM Blast",
      "TensionV": 27.0,
      "PreStetchV": 3,
      "StringH": "Babolat Pro",
      "TensionH": 26.0,
      "PreStetchH": 2
    }
  }
  ```

  ## Responses
  - **201 Created**: `PedidoLineaResponseDto` con datos de la línea creada
  - **400 Bad Request**: Datos inválidos
  - **401 Unauthorized**: Token inválido o expirado
  - **403 Forbidden**: No tiene permisos de Encoder

http:
  method: POST
  url: "{{api-url}}/api/Purchased/01ARZ3NDEKTSV4RRFFQ69G1FAV/lineas"
  body:
    type: json
    data: |-
      {
        "RaquetModel": "Babolat Pure Drive",
        "Nudos": 2,
        "DateString": "2026-06-20T00:00:00Z",
        "Logotype": false,
        "Color": "Azul",
        "StringSetup": {
          "StringV": "Babolat RPM Blast",
          "TensionV": 27.0,
          "PreStetchV": 3,
          "StringH": "Babolat Pro",
          "TensionH": 26.0,
          "PreStetchH": 2
        }
      }
  auth:
    type: bearer
    token: "{{token_encoder}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5