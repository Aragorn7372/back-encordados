docs: |
  # Obtener Pedido por ID

  Obtiene los detalles de un pedido específico por su ID.

  ## Authorization
  Multi-rol (debe tener acceso al pedido)

  ## HTTP Method
  `GET /api/Purchased/{id}`

  ## Parameters (Path)
  | Parámetro | Tipo | Descripción |
  |-----------|------|-------------|
  | `id` | string (ULID) | ID único del pedido |

  ## Responses
  - **200 OK**: `PurchasedResponseDto` con datos completos del pedido
  - **401 Unauthorized**: Token inválido o expirado
  - **403 Forbidden**: No tiene acceso a este pedido
  - **404 Not Found**: Pedido no encontrado

  ## Test Cases
  - [ ] Obtener pedido existente por ID válido
  - [ ] Intentar obtener pedido inexistente (404)
  - [ ] Admin obtiene cualquier pedido
  - [ ] User intenta obtener pedido de otro (403)
