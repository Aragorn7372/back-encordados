docs: |
  # Cambiar Estado de Todas las Líneas - Error Estado Inválido

  Verifica que retorna 400 cuando se envía un estado inválido.

  ## Authorization
  RequireEncorderRole (Admin, Owner, Encorder)

  ## HTTP Method
  `PATCH /api/Purchased/change-status/{id}`

  ## Body (JSON)
  ```json
  "INVALID_STATUS"
  ```

  ## Responses
  - **400 Bad Request**: Estado inválido

  ## Test Cases
  - [ ] Enviar estado que no existe en el enum
  - [ ] Enviar string vacío
  - [ ] Enviar números
