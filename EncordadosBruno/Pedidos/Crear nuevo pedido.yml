docs: |
  # Crear Nuevo Pedido

  Crea un nuevo pedido de encordado de raqueta.

  ## Authorization
  RequireEncoderRole

  ## HTTP Method
  `POST /api/Purchased`

  ## Lógica de Bonos
  Al crear un pedido, se verifica si el jugador tiene bonos disponibles:
  - **Si Price <= Bonos**: El pedido se marca como `PAID` automaticamente, se descuenta el importe de los bonos del usuario y se envía email de confirmación de pago
  - **Si Price > Bonos y Bonos > 0**: Se agrega al campo `Comments` el mensaje "Falta por pagar: $X" (donde X es la diferencia)
  - **Si Bonos = 0**: El pedido queda con estado `PENDING_PAYMENT` (comportamiento original)

  ## Body (JSON)
  ```json
  {
    "TournamentId": 1,
    "PlayerName": "jugador_juan",
    "AssignedToName": "carlos_encordador",
    "Machine": "Máquina Alpha-1",
    "Comments": "Nuevo pedido para el Torneo Madrileño",
    "PayStatus": "PENDING_PAYMENT",
    "Lineas": [
      {
        "RaquetModel": "Wilson Clash 100",
        "Nudos": 1,
        "DateString": "2026-06-15T00:00:00Z",
        "Logotype": true,
        "Color": "Rojo",
        "StringSetup": {
          "StringV": "Babolat RPM Blast",
          "TensionV": 26.0,
          "PreStetchV": 2,
          "StringH": "Babolat Pro",
          "TensionH": 25.5,
          "PreStetchH": 1
        }
      }
    ]
  }
  ```

  ## Campos Principales
  | Campo | Tipo | Descripción |
  |-------|------|-------------|
  | `TournamentId` | long | ID del torneo asociado |
  | `PlayerName` | string | Nombre de usuario del jugador |
  | `AssignedToName` | string | Nombre de usuario del encordador |
  | `Machine` | string | Máquina a usar |
  | `PayStatus` | string | Estado de pago (PENDING_PAYMENT, PAID, OVERDUE) |
  | `Lineas` | array | Array de líneas de pedido (mínimo 1) |

  ## Responses
  - **201 Created**: `PurchasedResponseDto` con datos del pedido creado
  - **400 Bad Request**: Datos inválidos o sin líneas
  - **401 Unauthorized**: Token inválido o expirado
  - **403 Forbidden**: No tiene permisos de Encoder

  ## Test Cases Adicionales
  - [ ] Crear pedido cuando el jugador tiene bonos suficientes (se marca PAID automaticamente)
  - [ ] Crear pedido cuando el jugador tiene bonos insuficientes (agrega "Falta por pagar" en Comments)
  - [ ] Verificar que los bonos del jugador se descuenta después de un pedido pagado
