docs: |
  # Crear Nuevo Pedido como Encoder

  Crea un nuevo pedido de encordado de raqueta.

  ## Authorization
  RequireEncoderRole

  ## HTTP Method
  `POST /api/Purchased`

  ## Body (JSON)
  ```json
  {
    "TournamentId": 1,
    "PlayerName": "jugador_juan",
    "AssignedToName": "carlos_encordador",
    "Machine": "Máquina Alpha-1",
    "Comments": "Nuevo pedido para el Torneo Madrileño",
    "PayStatus": "PENDING_PAYMENT",
    "Lineas": [
      {
        "RaquetModel": "Wilson Clash 100",
        "Nudos": 1,
        "DateString": "2026-06-15T00:00:00Z",
        "Logotype": true,
        "Color": "Rojo",
        "StringSetup": {
          "StringV": "Babolat RPM Blast",
          "TensionV": 26.0,
          "PreStetchV": 2,
          "StringH": "Babolat Pro",
          "TensionH": 25.5,
          "PreStetchH": 1
        }
      }
    ]
  }
  ```

  ## Responses
  - **201 Created**: `PurchasedResponseDto` con datos del pedido creado
  - **400 Bad Request**: Datos inválidos o sin líneas
  - **401 Unauthorized**: Token inválido o expirado
  - **403 Forbidden**: No tiene permisos de Encoder
