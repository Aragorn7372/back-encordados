info:
  name: obtener pedidos
  type: http
  seq: 2

http:
  method: GET
  url: "{{api-url}}/api/Purchased"
  auth:
    type: bearer
    token: "{{token_encorder_carlos}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  # Obtener Pedidos

  Lista pedidos con soporte para filtros y paginación. Los resultados se filtran según el rol del usuario.

  ## Authorization
  Multi-rol (Admin/Owner ve todos, Encorder ve los suyos, User ve los suyos)

  ## HTTP Method
  `GET /api/Purchased`

  ## Parameters (Query)
  | Parámetro | Tipo | Default | Descripción |
  |-----------|------|---------|-------------|
  | `tournamentId` | long? | null | Filtrar por ID de torneo |
  | `search` | string | "" | Búsqueda por nombre de jugador |
  | `page` | int | 0 | Número de página |
  | `size` | int | 10 | Tamaño de página |
  | `sortBy` | string | "createdAt" | Campo de ordenamiento |
  | `direction` | string | "desc" | Dirección (asc/desc) |

  ## Responses
  - **200 OK**: `PageResponseDto<PurchasedResponseDto>`
  - **401 Unauthorized**: Token inválido o expirado
  - **403 Forbidden**: Rol no tiene acceso

  ## Test Cases
  - [ ] Admin obtiene todos los pedidos
  - [ ] Encorder obtiene solo sus pedidos
  - [ ] User obtiene solo sus pedidos
  - [ ] Verificar paginación
  - [ ] Buscar por nombre de jugador
  - [ ] Filtrar por tournamentId
