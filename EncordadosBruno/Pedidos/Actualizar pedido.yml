docs: |
  # Actualizar Pedido

  Actualiza los datos de un pedido existente.

  ## Authorization
  RequireEncoderRole

  ## HTTP Method
  `PUT /api/Purchased/{id}`

  ## Parameters (Path)
  | Parámetro | Tipo | Descripción |
  |-----------|------|-------------|
  | `id` | string (ULID) | ID único del pedido |

  ## Body (JSON - todos los campos opcionales)
  ```json
  {
    "Machine": "Máquina Beta-2",
    "Comments": "Pedido actualizado por encoder",
    "PayStatus": "PAID"
  }
  ```

  ## Campos Actualizables
  | Campo | Tipo | Descripción |
  |-------|------|-------------|
  | `Machine` | string? | Máquina a usar |
  | `Comments` | string? | Comentarios del pedido |
  | `PayStatus` | string? | Estado de pago (PENDING_PAYMENT, PAID, OVERDUE) |

  ## Responses
  - **200 OK**: `PurchasedResponseDto` con datos actualizados
  - **400 Bad Request**: Datos inválidos
  - **401 Unauthorized**: Token inválido o expirado
  - **403 Forbidden**: No tiene permisos de Encoder
   - **404 Not Found**: Pedido no encontrado

   ## Test Cases
   - [ ] Actualizar todos los campos opcionales (200)
   - [ ] Actualizar solo un campo (200)
   - [ ] Actualizar con campos inválidos (400)
   - [ ] Actualizar pedido inexistente (404)
   - [ ] Actualizar sin token (401)
   - [ ] Actualizar con token de Admin (403)
