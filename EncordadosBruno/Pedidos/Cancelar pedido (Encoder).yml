docs: |
  # Cancelar Pedido como Encoder

  Cancela un pedido existente.

  ## Authorization
  RequireEncoderRole

  ## HTTP Method
  `DELETE /api/Purchased/{id}`

  ## Parameters (Path)
  | Parámetro | Tipo | Descripción |
  |-----------|------|-------------|
  | `id` | string | ID del pedido |

  ## Responses
  - **204 No Content**: Pedido cancelado exitosamente
  - **401 Unauthorized**: Token inválido o expirado
  - **403 Forbidden**: No tiene permisos de Encoder
  - **404 Not Found**: Pedido no encontrado

