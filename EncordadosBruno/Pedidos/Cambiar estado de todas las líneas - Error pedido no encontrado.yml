  # Cambiar Estado de Todas las Líneas - Error Pedido No Encontrado

  Verifica que retorna 404 cuando el pedido no existe.

  ## Authorization
  RequireEncorderRole (Admin, Owner, Encorder)

  ## HTTP Method
  `PATCH /api/Purchased/change-status/{id}`

  ## Body (JSON)
  ```json
  "IN_PROGRESS"
  ```

  ## Responses
  - **404 Not Found**: Pedido no encontrado

  ## Test Cases
  - [ ] ID de pedido que no existe
  - [ ] ID con formato ULID inválido
