docs: |
  # Cancelar Pedido

  Cancela un pedido existente.

  ## Authorization
  RequireEncoderRole

  ## HTTP Method
  `PATCH /api/Purchased/cancel/{id}`

  ## Parameters (Path)
  | Parámetro | Tipo | Descripción |
  |-----------|------|-------------|
  | `id` | string (ULID) | ID único del pedido |

  ## Responses
  - **200 OK**: `PurchasedResponseDto` con estado cancelado
  - **401 Unauthorized**: Token inválido o expirado
  - **403 Forbidden**: No tiene permisos de Encoder
  - **404 Not Found**: Pedido no encontrado
