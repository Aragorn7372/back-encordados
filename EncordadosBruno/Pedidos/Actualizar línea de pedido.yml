docs: |
  # Actualizar Línea de Pedido

  Actualiza los datos de una línea de pedido existente.

  ## Authorization
  RequireEncoderRole

  ## HTTP Method
  `PUT /api/Purchased/lineas/{lineaId}`

  ## Parameters (Path)
  | Parámetro | Tipo | Descripción |
  |-----------|------|-------------|
  | `lineaId` | string (ULID) | ID único de la línea |

  ## Body (JSON - todos los campos opcionales)
  ```json
  {
    "RaquetModel": "Babolat Pure Drive",
    "Nudos": 1,
    "Logotype": true,
    "Color": "Verde",
    "Status": "IN_PROGRESS",
    "StringSetup": {
      "StringV": "Head Sonic Pro",
      "TensionV": 25.0,
      "PreStetchV": 1
    }
  }
  ```

  ## Campos Actualizables
  | Campo | Tipo | Descripción |
  |-------|------|-------------|
  | `RaquetModel` | string? | Modelo de raqueta |
  | `Nudos` | byte? | Número de nudos |
  | `Logotype` | bool? | Si lleva logo |
  | `Color` | string? | Color |
  | `Status` | string? | Estado de la línea |
  | `StringSetup` | object? | Configuración de cuerdas |

  ## Responses
  - **200 OK**: `PedidoLineaResponseDto` con datos actualizados
  - **400 Bad Request**: Datos inválidos
  - **401 Unauthorized**: Token inválido o expirado
  - **403 Forbidden**: No tiene permisos de Encoder
  - **404 Not Found**: Línea no encontrada
