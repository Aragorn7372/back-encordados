docs: |
  # Export Avanzado (Excel)

  Exporta datos de un torneo específico en formato Excel con opciones configurables.

  ## Tipos disponibles (separados por coma):
  - users
  - materials
  - cuerdas
  - tournament
  - pedidos

  ## Authorization
  Requiere rol ADMIN o OWNER

  ## Query Parameters
  - **tournamentId** (required): ID del torneo
  - **types** (optional): Tipos a exportar separados por coma. Si no se especifica, exporta todos.

  ## Ejemplos de uso
  - Exportar todo: ?tournamentId=1
  - Solo usuarios y pedidos: ?tournamentId=1&types=users,pedidos
  - Solo materiales y cuerdas: ?tournamentId=1&types=materials,cuerdas

  ## Responses
  - **200 OK**: Archivo Excel (.xlsx) con sheets por tipo
  - **403 Forbidden**: No tiene permisos (no es Admin/Owner del torneo)

  ## Test Cases
  - [ ] Exportar todos los tipos de datos del torneo
  - [ ] Exportar solo usuarios y pedidos
  - [ ] Exportar con tournamentId inválido (400)
  - [ ] Intentar exportar sin permisos de Admin (403)
  - [ ] Exportar torneo sin datos (archivo vacío)
