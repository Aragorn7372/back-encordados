docs: |
  # Importar Datos (Excel)

  Importa datos de un archivo Excel a un torneo específico.

  ## Tipos disponibles (separados por coma):
  - users
  - materials
  - cuerdas
  - tournament
  - pedidos

  ## Authorization
  Requiere rol ADMIN o OWNER

  ## Query Parameters
  - **tournamentId** (required): ID del torneo
  - **types** (optional): Tipos a importar separados por coma. Si no se especifica, importa todos.

  ## Request Body
  Archivo Excel (.xlsx) con el mismo formato que el export.

  ## Responses
  - **200 OK**: Retorna ExcelImportResultDto con el resumen de importación
  - **400 Bad Request**: Archivo inválido o formato incorrecto
  - **403 Forbidden**: No tiene permisos (no es Admin/Owner del torneo)
