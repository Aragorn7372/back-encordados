  url: "{{api-url}}/api/Auth/signin"
  body:
    type: json
    data: |-
      {
        "Username":"example",
        "Password":"buenas noches"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();

        bru.setEnvVar("token", data.token);

