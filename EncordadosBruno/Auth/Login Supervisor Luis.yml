info:
  name: Login Supervisor Luis
  type: http
  seq: 1

docs: |
  # Login Supervisor Luis

  Inicia sesión como supervisor para obtener token JWT.

  ## HTTP Method
  `POST /api/Auth/iniciar-sesion`

  ## Body (JSON)
  ```json
  {
    "Email": "luis@encordados.com",
    "Password": "supervisor123"
  }
  ```

  ## Responses
  - **200 OK**: Retorna token JWT
  - **401 Unauthorized**: Credenciales inválidas

http:
  method: POST
  url: "{{api-url}}/api/Auth/iniciar-sesion"
  body:
    type: json
    data: |-
      {
        "Email": "luis@encordados.com",
        "Password": "supervisor123"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

tests:
  - name: Save token
    assert:
      - type: json-res-val
        expression: "$.token"
        run: |
          bru.setVar("token_supervisor", JSON.parse(bru.getResponse()).token);