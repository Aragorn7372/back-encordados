info:
  name: Login Owner
  type: http
  seq: 2

http:
  method: POST
  url: "{{api-url}}/api/Auth/signin"
  body:
    type: json
    data: |-
      {
        "Username":"owner_principal",
        "Password":"owner123"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        bru.setEnvVar("token_owner", data.token);
        bru.setEnvVar("user_id_owner", data.user.id || "01KS0Q28TE2EFVQTCW8EN0W0MF");

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  # Login Owner

  Inicia sesión como propietario para obtener token JWT con rol OWNER.

  ## HTTP Method
  `POST /api/Auth/signin`

  ## Responses
  - **200 OK**: Retorna token JWT y datos del usuario
  - **401 Unauthorized**: Credenciales inválidas

  ## Test Cases
  - [ ] Login exitoso con credenciales de owner
  - [ ] Token owner se guarda en variable {{token_owner}}
  - [ ] Fallo con credenciales incorrectas
