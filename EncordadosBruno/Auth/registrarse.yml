info:
  name: registrarse
  type: http
  seq: 1

http:
  method: POST
  url: "{{api-url}}/api/Auth/signup"
  body:
    type: json
    data: |-
      {
        "Username":"example",
        "Email":"{{$randomExampleEmail}}",
        "Password":"buenas noches"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
