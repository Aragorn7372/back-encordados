docs: |
  # Obtener Trabajadores de Torneo como Owner

  Obtiene la lista de trabajadores asignados a un torneo.

  ## Authorization
  RequireOwnerRole

  ## HTTP Method
  `GET /api/Tournaments/{id}/workers`

  ## Parameters (Path)
  | Parámetro | Tipo | Descripción |
  |-----------|------|-------------|
  | `id` | ULID | ID del torneo (formato ULID) |

  ## Responses
  - **200 OK**: `List<WorkerMachineAssignmentResponseDto>` con trabajadores asignados
  - **401 Unauthorized**: Token inválido o expirado
  - **403 Forbidden**: No tiene permisos de Owner
  - **404 Not Found**: Torneo no encontrado
