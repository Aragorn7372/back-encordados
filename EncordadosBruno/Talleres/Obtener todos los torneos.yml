docs: |
  # Obtener Todos los Torneos

  Lista torneos con soporte para búsqueda y paginación.

  ## Authorization
  RequireAdminRole o RequireOwnerRole

  ## HTTP Method
  `GET /api/Tournaments`

  ## Parameters (Query)
  | Parámetro | Tipo | Default | Descripción |
  |-----------|------|---------|-------------|
  | `search` | string | "" | Búsqueda por nombre |
  | `page` | int | 0 | Número de página |
  | `pageSize` | int | 10 | Tamaño de página |
  | `sortBy` | string | "name" | Campo de ordenamiento |
  | `direction` | string | "asc" | Dirección (asc/desc) |

  ## Responses
  - **200 OK**: `PageResponseDto<TournamentResponseDto>`
  - **401 Unauthorized**: Token inválido o expirado
  - **403 Forbidden**: No tiene permisos (no es Admin/Owner)

  ## Test Cases
  - [ ] Listar torneos con paginación por defecto
  - [ ] Buscar torneo por nombre
  - [ ] Ordenar por diferentes campos
  - [ ] Intentar sin permisos (403)

http:
  method: GET
  url: "{{api-url}}/api/Tournaments?page=0&size=10&sortBy=createdAt&direction=desc"
  auth:
    type: bearer
    token: "{{token_admin}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5