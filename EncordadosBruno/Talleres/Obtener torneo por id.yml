docs: |
  # Obtener Torneo por ID

  Obtiene los detalles de un torneo específico por su ID.

  ## Authorization
  RequireEncorderRole

  ## HTTP Method
  `GET /api/Tournaments/{id}`

  ## Parameters (Path)
  | Parámetro | Tipo | Descripción |
  |-----------|------|-------------|
  | `id` | long | ID numérico del torneo |

  ## Responses
  - **200 OK**: `TournamentResponseDetailsDto` con datos completos del torneo
  - **401 Unauthorized**: Token inválido o expirado
  - **403 Forbidden**: No tiene permisos de Encorder
  - **404 Not Found**: Torneo no encontrado

  ## Test Cases
  - [ ] Obtener torneo existente por ID válido
  - [ ] Intentar obtener torneo inexistente (404)
  - [ ] Intentar sin permisos de Encorder (403)
