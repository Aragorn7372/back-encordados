docs: |
  # Importar Base de Datos

  Importa un archivo ZIP exportado previamente.
  **ADVERTENCIA**: Esto borra TODOS los datos existentes y los reemplaza con los datos del ZIP.

  ## Orden de importación
  1. Tournaments
  2. Users
  3. Materials
  4. Cuerdas
  5. Orders

  ## Authorization
  Requiere rol ADMIN

  ## HTTP Method
  `POST /api/export/import`

  ## Request
  - Content-Type: multipart/form-data
  - Body: file (ZIP)

  ## Responses
  - **200 OK**: `{ "message": "Database imported successfully" }`
  - **400 Bad Request**: Archivo inválido o no es un ZIP
  - **401 Unauthorized**: Token inválido o expirado
  - **403 Forbidden**: No tiene permisos (no es Admin)
  - **500 Internal Server Error**: Error durante la importación (hace rollback automático)

  ## Test Cases
  - [ ] Importar ZIP válido con todos los datos
  - [ ] Importar con archivo corrupto (400)
  - [ ] Importar con archivo que no es ZIP (400)
  - [ ] Intentar importar sin token (401)
  - [ ] Intentar importar sin rol Admin (403)
  - [ ] Verificar que la importación fallida hace rollback

  ## Notas
  - Usa transacciones: si falla algo, se revierten todos los cambios
  - En desarrollo (in-memory): las transacciones se saltan automáticamente
