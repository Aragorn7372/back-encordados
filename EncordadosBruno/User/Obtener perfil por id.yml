docs: |
  # Obtener Perfil por ID

  Obtiene los datos de un usuario específico por su ID (ULID).

  ## Authorization
  RequireAdminRole

  ## HTTP Method
  `GET /api/User/{id}`

  ## Parameters (Path)
  | Parámetro | Tipo | Descripción |
  |-----------|------|-------------|
  | `id` | ULID | ID único del usuario |

  ## Responses
  - **200 OK**: `UserResponseDto` con datos del usuario
  - **401 Unauthorized**: Token inválido o expirado
  - **403 Forbidden**: No tiene permisos de Admin
  - **404 Not Found**: Usuario no encontrado

  ## Test Cases
  - [ ] Obtener usuario existente por ID válido
  - [ ] Intentar obtener usuario con ID inexistente (404)
  - [ ] Intentar sin token (401)
  - [ ] Intentar sin rol Admin (403)

http:
  method: GET
  url: "{{api-url}}/api/User/{{user_id_juan}}"
  auth:
    type: bearer
    token: "{{token_admin}}"

settings:
  encodeUrl: true
  timeout: 0
