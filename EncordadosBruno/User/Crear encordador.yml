docs: |
  # Crear Encordador

  Crea un usuario como encordador y lo asigna a un torneo específico.

  ## Authorization
  RequireOwnerRole

  ## HTTP Method
  `POST /api/User/create-encoder`

  ## Request Body
  | Campo | Tipo | Descripción |
  |-------|------|-------------|
  | `userId` | ULID | ID del usuario a convertir en encordador |

  ## Responses
  - **204 No Content**: Encordador creado exitosamente
  - **400 Bad Request**: Datos inválidos
  - **401 Unauthorized**: Token inválido o expirado
  - **403 Forbidden**: No tiene permisos de Owner
  - **404 Not Found**: Usuario no encontrado
  - **409 Conflict**: El usuario ya es encordador
