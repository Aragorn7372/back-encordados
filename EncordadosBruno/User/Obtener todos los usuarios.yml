info:
  name: Obtener todos los usuarios
  type: http
  seq: 5

http:
  method: GET
  url: "{{api-url}}/api/User?tournamentId=1&findUsers=true&page=0&size=10&sortBy=createdAt&direction=desc"
  auth:
    type: bearer
    token: "{{token_admin}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  # Obtener Todos los Usuarios

  Lista usuarios de un torneo específico con soporte para filtros, búsqueda y paginación.

  ## Authorization
  RequireOwnerRole

  ## HTTP Method
  `GET /api/User?tournamentId={tournamentId}`

  ## Parameters (Query)
  | Parámetro | Tipo | Default | Descripción |
  |-----------|------|---------|-------------|
  | `tournamentId` | long | - | ID del torneo (obligatorio) |
  | `findUsers` | boolean | null | Filtrar solo usuarios |
  | `findEncorders` | boolean | null | Filtrar solo encordadores |
  | `search` | string | "" | Búsqueda por nombre/username |
  | `page` | int | 0 | Número de página |
  | `size` | int | 10 | Tamaño de página |
  | `sortBy` | string | "id" | Campo de ordenamiento |
  | `direction` | string | "asc" | Dirección (asc/desc) |

  ## Responses
  - **200 OK**: `PageResponseDto<UserWithIdDto>` con campos: userId, username, imageUrl, name
  - **401 Unauthorized**: Token inválido o expirado
  - **403 Forbidden**: No tiene permisos de Owner
