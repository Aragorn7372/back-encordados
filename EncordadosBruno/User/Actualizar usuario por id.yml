info:
  name: Actualizar usuario por id
  type: http
  seq: 8

docs: |
  # Actualizar Usuario por ID

  Actualiza los datos de un usuario específico (solo campos proporcionados).

  ## Authorization
  RequireAdminRole

  ## HTTP Method
  `PATCH /api/User/{id}`

  ## Parameters (Path)
  | Parámetro | Tipo | Descripción |
  |-----------|------|-------------|
  | `id` | ULID | ID único del usuario |

  ## Body (JSON - todos los campos opcionales)
  ```json
  {
    "Name": "string",
    "Email": "string",
    "Telefono": "string",
    "Username": "string"
  }
  ```

  ## Responses
  - **200 OK**: `UserResponseDto` con datos actualizados
  - **400 Bad Request**: Datos inválidos
  - **401 Unauthorized**: Token inválido o expirado
  - **403 Forbidden**: No tiene permisos de Admin
  - **404 Not Found**: Usuario no encontrado
  - **409 Conflict**: Username o Email ya existe

  ## Test Cases
  - [ ] Actualizar nombre de usuario
  - [ ] Actualizar email de usuario
  - [ ] Actualizar teléfono
  - [ ] Actualizar username
  - [ ] Intentar actualizar usuario inexistente (404)
  - [ ] Intentar con email duplicado (409)
  - [ ] Intentar sin permisos de Admin (403)

http:
  method: PATCH
  url: "{{api-url}}/api/User/{{user_id_juan}}"
  body:
    type: json
    data: |-
      {
        "Name": "Juan Martínez Actualizado",
        "Email": "juan.actualizado@tenis.com",
        "Telefono": "956789999",
        "Username": "juan_updated"
      }
  auth:
    type: bearer
    token: "{{token_admin}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5