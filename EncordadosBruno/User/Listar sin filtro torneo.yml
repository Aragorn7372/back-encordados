info:
  name: Listar usuarios sin filtro torneo
  type: http
  seq: 5

docs: |
  # Listar usuarios sin filtro de torneo

  Prueba que al llamar GET /api/User sin tournamentId retorna solo usuarios con TournamentId=null (admin, owner, encorders).

  ## Authorization
  RequireAdminRole

  ## HTTP Method
  `GET /api/User`

  ## Responses
  - **200 OK**: Lista de usuarios sin filtro de torneo

http:
  method: GET
  url: "{{api-url}}/api/User?page=0&size=10"
  auth:
    type: bearer
    token: "{{token_admin}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5