info:
  name: Asignar rol a usuario
  type: http
  seq: 10

docs: |
  # Asignar Rol a Usuario

  Asigna un rol específico a un usuario existente.

  ## Authorization
  RequireAdminRole

  ## HTTP Method
  `POST /api/User/{id}/roles?role={roleName}`

  ## Parameters (Path)
  | Parámetro | Tipo | Descripción |
  |-----------|------|-------------|
  | `id` | ULID | ID único del usuario |

  ## Parameters (Query)
  | Parámetro | Tipo | Descripción |
  |-----------|------|-------------|
  | `role` | string | Nombre del rol a asignar (ADMIN, USER, ENCORDER) |

  ## Responses
  - **204 No Content**: Rol asignado exitosamente
  - **400 Bad Request**: Nombre de rol inválido
  - **401 Unauthorized**: Token inválido o expirado
  - **403 Forbidden**: No tiene permisos de Admin
  - **404 Not Found**: Usuario no encontrado
  - **409 Conflict**: El usuario ya tiene ese rol

  ## Test Cases
  - [ ] Asignar rol ADMIN a usuario
  - [ ] Asignar rol ENCORDER a usuario
  - [ ] Asignar rol USER a usuario
  - [ ] Asignar rol inexistente (400)
  - [ ] Asignar rol a usuario inexistente (404)
  - [ ] Intentar sin permisos de Admin (403)

http:
  method: POST
  url: "{{api-url}}/api/User/{{user_id_juan}}/roles?role=ADMIN"
  auth:
    type: bearer
    token: "{{token_admin}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
