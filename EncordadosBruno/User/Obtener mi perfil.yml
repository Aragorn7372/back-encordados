info:
  name: Obtener mi perfil
  type: http
  seq: 2

http:
  method: GET
  url: "{{api-url}}/api/User/me"
  auth:
    type: bearer
    token: "{{token_admin}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  # Obtener Mi Perfil

  Obtiene los datos del usuario autenticado actualmente.

  ## Authorization
  RequireUserRole

  ## HTTP Method
  `GET /api/User/me`

  ## Respuesta (UserResponseDto)
  | Campo | Tipo | Descripción |
  |-------|------|-------------|
  | `username` | string | Nombre de usuario |
  | `imageUrl` | string | URL de la imagen de perfil |
  | `name` | string | Nombre completo del usuario |
  | `bonos` | double | Saldo de bonos del usuario |

  ## Responses
  - **200 OK**: `UserResponseDto` con datos del usuario actual
  - **401 Unauthorized**: Token inválido o expirado
  - **404 Not Found**: No se encontró el usuario en el token

  ## Test Cases
  - [ ] Obtener perfil con usuario autenticado
  - [ ] Intentar sin token (401)
  - [ ] Intentar con token de usuario inexistente (404)
  - [ ] Verificar que el campo `bonos` está presente en la respuesta
