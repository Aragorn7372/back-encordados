  # Health

  Endpoints de verificación de estado del sistema.

  ## Descripción
  Esta carpeta contiene los endpoints para:
  - **GET /health**: Verificación del estado del API

  ## Características
  - Endpoint público (no requiere autenticación)
  - Útil para monitoring y load balancers
  - Verifica que el servicio esté respondiendo

