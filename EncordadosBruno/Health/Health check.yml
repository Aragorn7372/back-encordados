docs: |
  # Health Check

  Verifica que el servicio esté funcionando correctamente.

  ## Authorization
  Ninguno (endpoint público)

  ## HTTP Method
  `GET /health`

  ## Responses
  - **200 OK**: Servicio funcionando correctamente
  - **503 Service Unavailable**: Servicio no disponible

  ## Test Cases
  - [ ] Verificar respuesta exitosa (200)
  - [ ] Verificar que no requiere autenticación
  - [ ] Usar para monitoring en producción

